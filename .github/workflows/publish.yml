name: Publish

# Publishes to npm on a version tag (e.g. `git tag v0.1.1 && git push --tags`)
# or a manual run. Auth is npm Trusted Publishing via GitHub OIDC — NO token,
# nothing to store or rotate. One-time setup on npmjs.com: package `shadok-ai`
# → Settings → Trusted Publisher → GitHub Actions, repo gnarco/shadok-ai,
# workflow `publish.yml`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # OIDC trusted publishing needs Node >= 22.14
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC needs npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish --access public # authenticates via OIDC, no NODE_AUTH_TOKEN
